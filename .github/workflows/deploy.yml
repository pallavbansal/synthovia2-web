name: Deploy Next.js to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Build Next.js App
        run: npm run build

      - name: Prepare VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 173.212.213.153
          username: root
          password: Boxinall@325
          port: 22

          script: |
            set -e

            APP_DIR=/home/synthovia.ai/app

            mkdir -p $APP_DIR

            echo "Installing Node.js if missing..."

            if ! command -v node >/dev/null 2>&1; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs
            fi

            echo "Installing PM2 if missing..."

            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi

            echo "Cleaning old app..."

            find $APP_DIR -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Upload Project Files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 173.212.213.153
          username: root
          password: Boxinall@325
          port: 22

          source: "."

          target: /home/synthovia.ai/app

      - name: Install & Start Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 173.212.213.153
          username: root
          password: Boxinall@325
          port: 22

          script: |
            set -e

            cd /home/synthovia.ai/app

            echo "Installing dependencies..."
            npm install

            echo "Stopping old PM2 app..."
            pm2 delete synthovia-web || true

            echo "Starting Next.js app..."
            pm2 start "npm start" --name synthovia-web

            pm2 save

            echo "Installing Nginx..."
            apt-get install -y nginx

            echo "Creating Nginx config..."

            cat > /etc/nginx/sites-available/synthovia.ai << 'EOF'
            server {
                listen 80;

                server_name synthovia.ai www.synthovia.ai;

                location / {
                    proxy_pass http://localhost:3000;

                    proxy_http_version 1.1;

                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';

                    proxy_set_header Host $host;

                    proxy_cache_bypass $http_upgrade;
                }
            }
            EOF

            ln -sf /etc/nginx/sites-available/synthovia.ai /etc/nginx/sites-enabled/synthovia.ai

            nginx -t

            systemctl restart nginx

            echo "Deployment completed successfully!"

